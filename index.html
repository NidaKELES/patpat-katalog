<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ürün Kataloğu</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="top-bar">
  <div class="header-row">
    <div class="logo left">
      <img src="images/karadeniz.jpeg" alt="Karadeniz Ticaret">
    </div>

    <h1>Ürün Kataloğu</h1>

    <div class="right-area">
      <img src="images/karden.PNG" class="logo-right" alt="KRD">

      <input
        type="text"
        id="searchInput"
        placeholder="Ürün adı, kod, marka ile ara..."
        autocomplete="off"
      />

      <div class="menu-wrap">
        <button id="productsBtn" class="menu-btn" type="button" aria-expanded="false">
          Ürünler <span class="caret">▾</span>
        </button>

        <div id="productsMenu" class="menu" aria-hidden="true">
          <div class="menu-head">
            <div class="menu-title">Ürünler</div>
            <button id="menuClose" class="menu-close" type="button">✕</button>
          </div>

          <div class="menu-panels">
            <!-- SOL: Gruplar -->
            <div class="panel panel-left">
              <button class="panel-top-btn" id="showAllBtn" type="button">Tümü (Genel)</button>
              <div class="panel-list" id="groupsList"></div>
            </div>

            <!-- SAĞ: Alt gruplar -->
            <div class="panel panel-right">
              <div class="panel-right-head" id="subsTitle">Alt Gruplar</div>
              <div class="panel-list" id="subsList">
                <div class="panel-empty">Bir grup seçin.</div>
              </div>
            </div>
          </div>

          <div class="menu-foot">
            <div class="current-filter">
              Seçim: <span id="currentFilterText">Tümü</span>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</header>

<main>
  <div id="productGrid" class="grid"></div>
</main>

<script src="app.js"></script>
</body>
</html>
